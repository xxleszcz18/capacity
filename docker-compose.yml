# Autoneum Capacity — uruchomienie produkcyjne w Docker Compose
#
#   docker compose up --build -d
#   docker compose logs -f
#   docker compose down
#
# Aplikacja: http://localhost:3001

services:
  capacity:
    build:
      context: .
      dockerfile: Dockerfile
    image: capacity-app:latest
    container_name: capacity-app
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_PATH: /data/capacity.db
      CLIENT_DIST: /app/client/dist
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      AUTH_ENFORCE: ${AUTH_ENFORCE:-1}
      BOOTSTRAP_ADMIN_LOGIN: ${BOOTSTRAP_ADMIN_LOGIN:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin12345}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3001}
      PASSWORD_RESET_TTL_HOURS: ${PASSWORD_RESET_TTL_HOURS:-24}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      DOCKER: "1"
    volumes:
      # Baza SQLite (persystencja między restartami)
      - capacity-data:/data
      # Backupy i załączniki — pod /data (zgodne ze ścieżkami względnymi backups, attachments)
      - capacity-backups:/data/backups
      - capacity-attachments:/data/attachments
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||3001)+'/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

volumes:
  capacity-data:
  capacity-backups:
  capacity-attachments:
